<!DOCTYPE html>
<html lang="en" id="html-root">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#f5f1e8">
    <title data-i18n="app.title">Shopping List</title>

    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">

    <!-- Apple Touch Icon -->
    <link rel="apple-touch-icon" href="icon-192x192.png">

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="icon-32.png">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-top">
                <h1 data-i18n="ui.header.title">🛒 Shopping List</h1>
                <div class="language-dropdown">
                    <button type="button" id="language-button" class="language-button" aria-label="Change language" aria-haspopup="true" aria-expanded="false">
                        <svg class="globe-icon" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"/>
                            <line x1="2" y1="12" x2="22" y2="12"/>
                            <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
                        </svg>
                    </button>
                    <div id="language-menu" class="language-menu" role="menu" aria-hidden="true">
                        <button type="button" role="menuitem" class="language-option" data-lang="en" data-i18n="ui.language.english">English</button>
                        <button type="button" role="menuitem" class="language-option" data-lang="pt" data-i18n="ui.language.portuguese">Português</button>
                    </div>
                </div>
            </div>
            <div class="install-prompt" id="install-prompt" style="display: none;">
                <button id="install-button" data-i18n="ui.header.install">Install App</button>
            </div>
        </header>

        <main>
            <!-- Add Item Form -->
            <section class="add-item-section">
                <form id="add-item-form">
                    <div class="input-group">
                        <input
                            type="text"
                            id="item-input"
                            placeholder="Add item to shopping list..."
                            data-i18n-placeholder="ui.input.placeholder"
                            autocomplete="off"
                            required
                        >
                        <button type="submit" data-i18n="ui.input.addButton">Add</button>
                    </div>
                </form>
            </section>

            <!-- Search Section -->
            <section class="search-section">
                <div class="search-group">
                    <input
                        type="text"
                        id="search-input"
                        placeholder="Search items..."
                        data-i18n-placeholder="ui.search.placeholder"
                        autocomplete="off"
                    >
                    <button type="button" id="clear-search" class="clear-search" aria-label="Clear search" data-i18n-aria-label="ui.search.clear" style="display: none;">×</button>
                </div>
            </section>

            <!-- Shopping List -->
            <section class="shopping-list-section">
                <h2 data-i18n="ui.sections.shoppingList">Shopping List</h2>
                <ul id="shopping-list" class="item-list">
                    <!-- Items will be dynamically added here -->
                </ul>
                <div id="empty-state" class="empty-state">
                    <p data-i18n="ui.empty.shopping">Your shopping list is empty</p>
                    <p data-i18n="ui.empty.shoppingSubtext">Add items above to get started!</p>
                </div>
            </section>

            <!-- Completed Items -->
            <section class="completed-section">
                <h2 data-i18n="ui.sections.completedItems">Completed Items</h2>
                <ul id="completed-list" class="item-list completed">
                    <!-- Completed items will be dynamically added here -->
                </ul>
                <div id="completed-empty-state" class="empty-state">
                    <p data-i18n="ui.empty.completed">No completed items yet</p>
                </div>
            </section>
        </main>

        <footer>
            <div class="stats">
                <span id="active-count">0 items</span>
                <span id="completed-count">0 completed</span>
            </div>
            <div class="share-actions">
                <button type="button" id="export-button" data-i18n="ui.actions.export">Export</button>
                <button type="button" id="copy-button" data-i18n="ui.actions.copy">Copy</button>
                <input type="file" id="import-input" accept=".json,.txt,application/json,text/plain" hidden>
                <button type="button" id="import-button" data-i18n="ui.actions.import">Import</button>
                <button type="button" id="paste-button" data-i18n="ui.actions.paste">Paste</button>
            </div>
        </footer>
    </div>

    <!-- Offline indicator -->
    <div id="offline-indicator" class="offline-indicator" style="display: none;">
        <span data-i18n="ui.offline">You're offline - changes will sync when connection is restored</span>
    </div>

    <!-- Update available banner -->
    <div id="update-banner" class="update-banner" style="display: none;">
        <div class="update-content">
            <span class="update-icon">↻</span>
            <span class="update-message" data-i18n="ui.update.message">New version available!</span>
            <button id="update-button" class="update-button" data-i18n="ui.update.button">Update Now</button>
            <button id="dismiss-update" class="dismiss-update" aria-label="Dismiss">×</button>
        </div>
    </div>

    <script src="i18n.js"></script>
    <script src="app.js"></script>
</body>
</html>
